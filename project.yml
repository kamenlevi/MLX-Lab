name: MLXLab
options:
  bundleIdPrefix: app.mlxlab
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    DEVELOPMENT_TEAM: ""
    SWIFT_STRICT_CONCURRENCY: minimal
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
targets:
  MLXLab:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: MLXLab
        excludes:
          - "python_backend/**/__pycache__/**"
          - "python_backend/**/*.pyc"
          - "Resources/Info.plist"
          - "Resources/MLXLab.entitlements"
    resources:
      - path: MLXLab/Resources/Assets.xcassets
      - path: MLXLab/python_backend
        buildPhase: resources
    info:
      path: MLXLab/Resources/Info.plist
    entitlements:
      path: MLXLab/Resources/MLXLab.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.mlxlab.MLXLab
        PRODUCT_NAME: MLXLab
        COMBINE_HIDPI_IMAGES: YES
        ENABLE_PREVIEWS: YES
        INFOPLIST_KEY_NSHumanReadableCopyright: "© MLX Lab contributors"
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
schemes:
  MLXLab:
    build:
      targets:
        MLXLab: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
